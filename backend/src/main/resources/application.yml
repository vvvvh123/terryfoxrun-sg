spring:
  application:
    name: terry-fox-run-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/terryfoxrun}
    username: ${DATABASE_USERNAME:terryfox}
    password: ${DATABASE_PASSWORD:terryfox}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SUPABASE_AUTH_ISSUER:https://lhpondhrhnjnimvyozdc.supabase.co/auth/v1}
          jwk-set-uri: ${SUPABASE_AUTH_JWKS_URI:https://lhpondhrhnjnimvyozdc.supabase.co/auth/v1/.well-known/jwks.json}

app:
  security:
    enabled: ${APP_SECURITY_ENABLED:true}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  payments:
    reference-prefix: ${PAYMENT_REFERENCE_PREFIX:TFR}

# TODO: configure Supabase Auth, datasource, mail provider, and object storage.

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      probes:
        enabled: true
